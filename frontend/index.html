<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatPad — Matrix Operations</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Header ──────────────────��──────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⊞</span>
        <span class="logo-text">MatPad</span>
      </div>
      <p class="logo-tagline">Interactive matrix operations workspace</p>
    </div>
  </header>

  <main class="workspace">

    <!-- ── Matrix definition bar ─────────���───────────────────────────────── -->
    <div class="matrix-defn-bar">
      <div id="matrix-chips" class="matrix-chips"></div>
      <button class="btn btn-add-matrix" id="btn-add-matrix">
        <svg viewBox="0 0 20 20" width="13" height="13"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        Add Matrix
      </button>
    </div>

    <!-- ── Operation bar ──────────────────��────────────────────────────��──── -->
    <div class="operation-bar">
      <div class="op-textarea-wrapper" id="op-textarea-wrapper">
        <textarea id="op-expression" class="op-textarea" rows="3"
                  placeholder="Enter expressions here — one per line&#10;e.g.  add(A, B)     det(A) + tr(B)     A * inv(B)"></textarea>
        <div id="autocomplete-dropdown" class="autocomplete-dropdown" hidden></div>
      </div>
      <div class="op-actions">
        <button class="btn btn-primary btn-compute" id="btn-compute">
          <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 4l12 6-12 6V4z" fill="currentColor"/></svg>
          Compute
        </button>
        <button class="btn btn-ghost" id="btn-clear-results">Clear</button>
      </div>
    </div>

    <!-- ── Panels 1 + 2 side-by-side on desktop ──────────────────────────── -->
    <div class="workspace-row">

      <!-- ── Panel 1 — Matrix Input ───────────────��─────────────────────── -->
      <section class="panel" id="panel-input" data-panel-id="input">
        <div class="panel-header" role="button" tabindex="0" aria-expanded="true"
             aria-controls="panel-input-body" onclick="togglePanel('input')">
          <div class="panel-title">
            <span class="panel-num">1</span>
            <h2>Matrix Input</h2>
          </div>
          <button class="panel-toggle-btn" tabindex="-1" aria-hidden="true">
            <svg class="chevron" viewBox="0 0 20 20"><path d="M5 7l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="panel-body" id="panel-input-body">
          <div id="matrices-container">
            <p class="empty-hint">Add a matrix using the bar above.</p>
          </div>
        </div>
      </section>

      <!-- ── Panel 2 — Results ───────────────────────��──────────────────── -->
      <section class="panel" id="panel-results" data-panel-id="results">
        <div class="panel-header" role="button" tabindex="0" aria-expanded="true"
             aria-controls="panel-results-body" onclick="togglePanel('results')">
          <div class="panel-title">
            <span class="panel-num">2</span>
            <h2>Results</h2>
          </div>
          <button class="panel-toggle-btn" tabindex="-1" aria-hidden="true">
            <svg class="chevron" viewBox="0 0 20 20"><path d="M5 7l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="panel-body" id="panel-results-body">
          <div id="results-container">
            <p class="empty-hint">Results will appear here after computation.</p>
          </div>
        </div>
      </section>

    </div><!-- /workspace-row -->

    <!-- ── Capabilities panel ─────────────────────────────────────────────── -->
    <section class="panel panel-capabilities" id="panel-caps" data-panel-id="caps">
      <div class="panel-header" role="button" tabindex="0" aria-expanded="false"
           aria-controls="panel-caps-body" onclick="togglePanel('caps')">
        <div class="panel-title">
          <span class="panel-num">⊕</span>
          <h2>Capabilities Reference</h2>
        </div>
        <button class="panel-toggle-btn" tabindex="-1" aria-hidden="true">
          <svg class="chevron" viewBox="0 0 20 20"><path d="M5 7l5 5 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="panel-body" id="panel-caps-body" hidden>
        <div class="caps-search-row">
          <input type="search" id="caps-search" class="caps-search-input"
                 placeholder="Search by name, operator, or description…" />
        </div>
        <div id="caps-table-container">
          <p class="empty-hint">Loading operations…</p>
        </div>
      </div>
    </section>

  </main>

  <script src="/js/app.js"></script>
</body>
</html>
